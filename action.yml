name: 'GitScope Report Generator'
description: 'Generate beautiful HTML reports from any git repository'
author: 'GitScope'
branding:
  icon: 'bar-chart-2'
  color: 'green'

inputs:
  output-path:
    description: 'Where to save the generated report'
    required: false
    default: './gitscope-report.html'
  theme:
    description: 'Report theme: default, dark, or minimal'
    required: false
    default: 'default'
  include-contributors:
    description: 'Include contributor analysis'
    required: false
    default: 'true'
  include-languages:
    description: 'Include language breakdown'
    required: false
    default: 'true'
  include-commits:
    description: 'Include recent commit history'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Generate Report
      shell: bash
      run: |
        echo "🔍 Generating GitScope report..."
        echo "Repository: ${{ github.repository }}"
        
        # Gather git data
        TOTAL_COMMITS=$(git rev-list --count HEAD 2>/dev/null || echo "N/A")
        TOTAL_CONTRIBUTORS=$(git log --format='%an' | sort -u | wc -l | tr -d ' ')
        FIRST_COMMIT=$(git log --reverse --format='%ai' | head -1 | cut -d' ' -f1 2>/dev/null || echo "N/A")
        LAST_COMMIT=$(git log -1 --format='%ai' 2>/dev/null || echo "N/A")
        
        echo "📊 Stats: $TOTAL_COMMITS commits, $TOTAL_CONTRIBUTORS contributors"
        
        # Generate HTML report
        cat > "${{ inputs.output-path }}" << 'HTML'
        <!DOCTYPE html>
        <html lang="en">
        <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GitScope Report — ${{ github.repository }}</title>
        <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
        <style>
          *{margin:0;padding:0;box-sizing:border-box;}
          body{background:#0b0b0b;color:#e8e6e3;font-family:'DM Mono',monospace;padding:2rem;line-height:1.6;}
          .wrap{max-width:800px;margin:0 auto;}
          h1{font-family:'Instrument Serif',serif;font-size:2.8rem;font-weight:400;letter-spacing:-.03em;}
          .meta{color:#666;font-size:0.8rem;margin:0.5rem 0 2rem;}
          .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#1f1f1f;border:1px solid #1f1f1f;margin:2rem 0;}
          .cell{background:#0b0b0b;padding:1.5rem;text-align:center;}
          .num{font-family:'Instrument Serif',serif;font-size:2rem;color:#a3e635;}
          .lbl{font-size:0.6rem;color:#555;text-transform:uppercase;letter-spacing:.12em;margin-top:0.3rem;}
          .section{margin:2rem 0;}
          .st{font-family:'Instrument Serif',serif;font-size:1.2rem;color:#a3e635;margin-bottom:1rem;}
          .commit{padding:0.4rem 0;border-bottom:1px solid #111;font-size:0.75rem;display:flex;gap:0.5rem;}
          .commit .hash{color:#a3e635;width:70px;}
          .commit .msg{flex:1;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
          .commit .date{color:#555;width:80px;}
          .commit .author{color:#666;width:90px;text-align:right;}
          .footer{text-align:center;padding:2rem;margin-top:3rem;border-top:1px solid #1f1f1f;font-size:0.65rem;color:#444;}
          .footer a{color:#a3e635;text-decoration:none;}
        </style>
        </head>
        <body>
        <div class="wrap">
          <h1>${{ github.repository }}</h1>
          <p class="meta">Generated by GitScope · ${{ github.workflow }} · ${{ github.run_number }}</p>
          
          <div class="grid">
            <div class="cell"><div class="num">'"$TOTAL_COMMITS"'</div><div class="lbl">Commits</div></div>
            <div class="cell"><div class="num">'"$TOTAL_CONTRIBUTORS"'</div><div class="lbl">Contributors</div></div>
            <div class="cell"><div class="num">${{ github.run_number }}</div><div class="lbl">Builds</div></div>
          </div>
          
          <div class="section">
            <div class="st">📝 Recent Commits</div>
            $(git log --oneline -10 --format='<div class="commit"><span class="hash">%h</span><span class="msg">%s</span><span class="date">%ai</span><span class="author">%an</span></div>' 2>/dev/null || echo "<p>No commits found</p>")
          </div>
          
          <div class="section">
            <div class="st">👥 Contributors</div>
            $(git shortlog -sn 2>/dev/null | head -15 | while read count name; do echo "<div style='padding:0.3rem 0;border-bottom:1px solid #0f0f0f;font-size:0.75rem;display:flex;'><span style='color:#555;width:60px;'>$count commits</span><span style='color:#ccc;'>$name</span></div>"; done)
          </div>
          
          <div class="footer">
            <p>Generated by <a href="https://gitscope-micro.vercel.app">GitScope</a> · <a href="https://github.com/promptpolish-ai/gitscope-action">Add this Action to your repo</a></p>
            <p style="margin-top:0.5rem;">⚡ BTC: 1DQXcKwN95AWqwmwbscG7fRbEYMdWU9GB3</p>
          </div>
        </div>
        </body>
        </html>
        HTML
        
        echo "✅ Report generated: ${{ inputs.output-path }}"
        
    - name: Upload Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: gitscope-report
        path: ${{ inputs.output-path }}
        retention-days: 7
