name: 'GitScope Repo Health'
description: 'Automatically add a GitScope health badge to your README'
author: 'GitScope'
branding:
  icon: 'activity'
  color: 'green'
inputs:
  github-token:
    description: 'GitHub token'
    required: true
    default: ${{ github.token }}
runs:
  using: 'composite'
  steps:
    - name: 'Add GitScope Badge'
      shell: bash
      run: |
        REPO="${{ github.repository }}"
        BADGE="[![Repo Health](https://gitscope-micro.vercel.app/api/badge?repo=${REPO})](https://gitscope-micro.vercel.app/api/deliver?repo=${REPO})"
        echo "Badge URL: ${BADGE}"
        echo "Add this to your README.md:"
        echo ""
        echo "${BADGE}"
